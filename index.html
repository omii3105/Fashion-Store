<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StyleNest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
    <h1>StyleNest</h1>
    <nav>
        <a href="javascript:void(0)" onclick="toggleCart()" class="cart-link">
    <i class="fa-solid fa-cart-shopping"></i> Cart
</a>
    </nav>
</header>

<div class="category-bar">
    <button onclick="loadCategory('men')">Men’s Wear</button>
    <button onclick="loadCategory('women')">Women’s Wear</button>
    <button onclick="loadCategory('kids')">Kids Wear</button>
    <button onclick="loadCategory('accessories')">Fashion Accessories</button>
</div>

<div class="sub-category" id="subCategory"></div>

<div class="products" id="productContainer"></div>

<!-- CART SIDEBAR -->
<div id="cartSidebar">
    <div class="cart-header">
        <h2>Your Cart</h2>
        <span class="close-cart" onclick="toggleCart()">✕</span>
    </div>

    <div id="cart-items"></div>

    <div class="cart-footer">
        <div class="total">Total: ₹ <span id="total">0</span></div>
        <button class="order-btn" onclick="placeOrder()">Place Order</button>
    </div>
</div>

<!-- OVERLAY -->
<div id="cartOverlay" onclick="toggleCart()"></div>


<!-- SIZE GUIDE MODAL -->
<div id="sizeModal" class="size-modal">
    <div class="size-content">
        <span class="close-size" onclick="closeSizeGuide()">×</span>
        <div id="sizeData"></div>
    </div>
</div>


<script src="script.js"></script>
<div id="toast"></div>
</body>
</html>
